<!DOCTYPE html>
<html>
<head>
  <title>SilentCare App</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 100px;
      background: #f5f5f5;
    }
    .box {
      background: white;
      padding: 30px;
      width: 320px;
      margin: auto;
      border-radius: 12px;
      box-shadow: 0 0 10px #ccc;
    }
    input {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
    }
    button {
      width: 95%;
      padding: 12px;
      background: blue;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="box" id="login">
  <h2>SilentCare</h2>
  <p>Smart Monitoring System for Elderly Safety</p>
  <input placeholder="Email"><br>
  <input placeholder="Password" type="password"><br>
  <button onclick="login()">Login</button>
</div>

<div class="box" id="dashboard" style="display:none;">
  <h2>Dashboard</h2>
  <p>Status: Active</p>
  <p>Last Activity: 20 min ago</p>
  <p>AI Monitoring: Normal activity detected</p>
</div>

<script>
function login() {
  document.getElementById("login").style.display = "none";
  document.getElementById("dashboard").style.display = "block";
}
</script>

</body>
</html>
